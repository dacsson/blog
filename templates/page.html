<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$title$</title>
  <link rel="stylesheet" href="$base$/style.css">
$if(highlighting-css)$
  <style>$highlighting-css$</style>
$endif$
</head>
<body>
<nav>
  <a href="$base$/">блог</a>
  <a href="$base$/instruments.html">инструменты</a>
</nav>
<div class="page">
  <aside class="toc" id="toc"></aside>
  <main>
$if(date)$
<h1>$title$</h1>
<p class="post-meta">$date$</p>
$endif$
$body$
  </main>
</div>
<footer>
  safonoff · <a href="mailto:sda20036@gmail.com">почта</a>
</footer>
<script>
document.querySelectorAll("h1[id],h2[id],h3[id],h4[id],h5[id]").forEach(h => {
  const a = document.createElement("a");
  a.href = "#" + h.id;
  a.className = "heading-link";
  a.textContent = "#";
  h.appendChild(a);
});

const toc = document.getElementById("toc");
const headings = document.querySelectorAll("main h2[id], main h3[id], main h4[id]");
if (headings.length > 1) {
  const title = document.createElement("strong");
  title.textContent = "Оглавление";
  toc.appendChild(title);
  const ul = document.createElement("ul");
  headings.forEach(h => {
    const li = document.createElement("li");
    li.className = h.tagName === "H3" ? "toc-h3" : h.tagName === "H4" ? "toc-h4" : "";
    const a = document.createElement("a");
    a.href = "#" + h.id;
    a.textContent = h.childNodes[0].textContent;
    li.appendChild(a);
    ul.appendChild(li);
  });
  toc.appendChild(ul);
} else {
  toc.style.display = "none";
}
</script>
</body>
</html>
